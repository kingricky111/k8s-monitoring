apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chaos-mesh-rbac
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/kingricky111/k8s-platform.git
      targetRevision: main
      path: platform/chaos-mesh/rbac
  destination:
    server: https://kubernetes.default.svc
    namespace: chaos-mesh
  syncPolicy:
    automated:
      prune: true
      selfHeal: true