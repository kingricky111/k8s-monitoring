apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dozzle
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/kingricky111/k8s-platform.git
      targetRevision: main
      path: platform/dozzle
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
