apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homelab-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: homelab-root-ca
  secretName: homelab-root-ca-secret
  privateKey:
    algorithm: RSA
    size: 4096
  issuerRef:
    name: homelab-selfsigned
    kind: ClusterIssuer