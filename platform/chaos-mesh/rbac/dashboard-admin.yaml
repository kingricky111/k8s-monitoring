apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-admin
  namespace: chaos-mesh
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: 
  name: chaos-mesh-dashboard-admin
rules:
  - apiGroups: 
      - chaos-mesh.org
    resources:
      - '*'
    verbs:
      - '*'

  - apiGroups: 
      - " "   
    resources:
      - 'pods'
      - 'services'
      - 'namespaces'
      - 'events'
      - 'nodes'
    verbs:
      - 'get'
      - 'list'
      - 'watch'

  - apiGroups:
      - 'apps'
    resources:
      - 'deployments'
      - 'statefulsets'
      - 'daemonsets'
      - 'replicasets'
    verbs:
      - 'get'
      - 'list'
      - 'watch'

  - apiGroups:
      - 'batch'
    resources:
      - 'jobs'
      - 'cronjobs'  
      - 'jobs'
      - 'cronjobs'
    verbs:
      - 'get'
      - 'list'
      - 'watch'
  - apiGroups:
      - 'metrics.k8s.io'
    resources:
      - 'pods'
      - 'nodes'
    verbs:
      - 'get'
      - 'list'
      - 'watch'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chaos-mesh-dashboard-admin
subjects:
- kind: ServiceAccount
  name: chaos-admin
  namespace: chaos-mesh
roleRef:
  kind: ClusterRole
  name: chaos-mesh-dashboard-admin
  apiGroup: rbac.authorization.k8s.io